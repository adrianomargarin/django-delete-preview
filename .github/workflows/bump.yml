name: Bump version

on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Version increment (leave empty for auto-detect from commits)"
        required: false
        type: choice
        options:
          - ""
          - patch
          - minor
          - major
        default: ""

permissions:
  contents: write  # push commit/tag + create GitHub Release

jobs:
  bump:
    name: Bump version and push tag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install commitizen
        run: pip install commitizen

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          if [ -n "${{ github.event.inputs.increment }}" ]; then
            cz bump --increment ${{ github.event.inputs.increment }} --yes
          else
            cz bump --yes
          fi

      - name: Push commit and tag
        run: git push && git push --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(git describe --tags --abbrev=0)
          gh release create "$TAG" --title "$TAG" --generate-notes
